<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Captain & Midnight Chat</title>
<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #2c2f33;
  color: #fff;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#top {
  background: #23272a;
  padding: 12px;
  font-weight: bold;
  text-align: center;
  border-bottom: 1px solid #000;
  font-size: 1.2em;
}

#usernameDisplay {
  text-align: center;
  margin: 6px 0;
  font-size: 1em;
  color: #7289da;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.msg {
  max-width: 70%;
  padding: 8px 12px;
  border-radius: 14px;
  word-wrap: break-word;
}

.me {
  align-self: flex-end;
  background: #7289da;
}

.other {
  align-self: flex-start;
  background: #99aab5;
  color: #000;
}

#bar {
  display: flex;
  padding: 8px;
  gap: 6px;
  border-top: 1px solid #000;
}

input[type="text"] {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #40444b;
  color: #fff;
}

button {
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  background: #7289da;
  color: white;
  cursor: pointer;
}

@media (max-width: 480px) {
  #top { font-size: 1em; }
  #bar input[type="text"] { padding: 8px; }
  button { padding: 8px 10px; }
  .msg { padding: 6px 10px; }
}
</style>
</head>
<body>

<div id="top">Captain & Midnight Chat</div>
<div id="usernameDisplay"></div>
<div id="chat"></div>

<div id="bar">
  <input id="msg" type="text" placeholder="Message">
  <button onclick="send()">Send</button>
</div>

<script>
let username;

// Ask for username on every visit
function askUsername(){
  username = prompt("Choose name: Captain or Midnight") || "Captain";
  document.getElementById('usernameDisplay').textContent = username;
}
askUsername();

const API_URL = "https://script.google.com/macros/s/AKfycbygwfzbB8Z43jYQHPxwkdlF0nK5slelRtvNisAqRkInigqzSc52kP5FcAdpt6MRTlE/exec"; // replace with your Google Sheets Web App URL

// Add a message to the chat
function addMessage(m){
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.classList.add('msg');
  div.classList.add(m.sender === username ? 'me' : 'other');
  div.textContent = m.sender + ": " + m.message;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// Load messages from Google Sheets
async function loadMessages(){
  try {
    const res = await fetch(API_URL);
    const msgs = await res.json();
    document.getElementById('chat').innerHTML = '';
    msgs.forEach(addMessage);
  } catch(err){
    console.error("Failed to load messages:", err);
  }
}

// Send a message to Google Sheets
async function send(){
  const input = document.getElementById('msg');
  const text = input.value.trim();
  if(!text) return;

  try {
    await fetch(API_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({sender: username, message: text})
    });
    input.value = "";
    loadMessages();
  } catch(err){
    console.error("Failed to send message:", err);
  }
}

// Auto-refresh chat every 2 seconds
setInterval(loadMessages, 2000);

// Load messages on page load
loadMessages();
</script>

</body>
</html>
