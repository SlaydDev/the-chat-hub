<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Captain Midnight Chat</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f0f0f;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

#top{
padding:10px;
text-align:center;
border-bottom:1px solid #333;
font-weight:bold;
}

#chat{
flex:1;
overflow-y:auto;
padding:10px;
display:flex;
flex-direction:column;
gap:6px;
}

.msg{
max-width:70%;
padding:8px 12px;
border-radius:14px;
word-wrap:break-word;
}

.me{
align-self:flex-end;
background:#2a84ff;
}

.other{
align-self:flex-start;
background:#333;
}

#bar{
display:flex;
padding:8px;
gap:6px;
border-top:1px solid #333;
}

input{
flex:1;
padding:10px;
border-radius:10px;
border:none;
outline:none;
background:#222;
color:white;
}

button{
padding:10px 14px;
border:none;
border-radius:10px;
background:#2a84ff;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div id="top">Captain • Midnight Chat</div>

<div id="chat"></div>

<div id="bar">
<input id="msg" placeholder="message">
<button onclick="send()">Send</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(
"https://vwqyragtlidgvloztqjj.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ3cXlyYWd0bGlkZ3Zsb3p0cWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MzA0NjMsImV4cCI6MjA4ODUwNjQ2M30.tIwQBFRbIRrXezIlzwmp0VUuomAldxJKJwwgFaMDvEs"
)

let sender = localStorage.getItem("sender")

if(!sender){
sender = prompt("Choose name: Captain or Midnight")
localStorage.setItem("sender",sender)
}

function addMessage(m){

const chat=document.getElementById("chat")

const div=document.createElement("div")
div.classList.add("msg")

if(m.sender===sender){
div.classList.add("me")
}else{
div.classList.add("other")
}

div.textContent=m.sender+": "+m.message

chat.appendChild(div)
chat.scrollTop=chat.scrollHeight
}

async function send(){

const input=document.getElementById("msg")

if(!input.value) return

await supabase
.from("chat_messages")
.insert([{sender:sender,message:input.value}])

input.value=""
}

async function load(){

const {data}=await supabase
.from("chat_messages")
.select("*")
.order("id",{ascending:true})

data.forEach(addMessage)

}

supabase
.channel("chat")
.on("postgres_changes",
{event:"INSERT",schema:"public",table:"chat_messages"},
payload=>{
addMessage(payload.new)
})
.subscribe()

load()

</script>

</body>
</html>
