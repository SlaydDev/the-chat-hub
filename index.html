<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Captain & Midnight Chat</title>
<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #2c2f33;
  color: #fff;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#top {
  background: #23272a;
  padding: 12px;
  font-weight: bold;
  text-align: center;
  border-bottom: 1px solid #000;
  font-size: 1.2em;
}

#usernameDisplay {
  text-align: center;
  margin: 6px 0;
  font-size: 1em;
  color: #7289da;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.msg {
  max-width: 70%;
  padding: 8px 12px;
  border-radius: 14px;
  word-wrap: break-word;
}

.me {
  align-self: flex-end;
  background: #7289da;
}

.other {
  align-self: flex-start;
  background: #99aab5;
  color: #000;
}

#bar {
  display: flex;
  padding: 8px;
  gap: 6px;
  border-top: 1px solid #000;
}

input[type="text"] {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #40444b;
  color: #fff;
}

button {
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  background: #7289da;
  color: white;
  cursor: pointer;
}

.msg img, .msg video {
  max-width: 100%;
  margin-top: 4px;
  border-radius: 8px;
}

@media (max-width: 480px) {
  #top { font-size: 1em; }
  #bar input[type="text"] { padding: 8px; }
  button { padding: 8px 10px; }
  .msg { padding: 6px 10px; }
}
</style>
</head>
<body>

<div id="top">Captain & Midnight Chat</div>
<div id="usernameDisplay"></div>
<div id="chat"></div>

<div id="bar">
  <input id="msg" type="text" placeholder="Message">
  <input id="fileInput" type="file" accept="image/*,video/*">
  <button onclick="send()">Send</button>
</div>

<script>
let username;

// always ask username on every visit
function askUsername(){
  username = prompt("Choose name: Captain or Midnight") || "Captain";
  document.getElementById('usernameDisplay').textContent = username;
}
askUsername();

// Load messages from localStorage
let messages = JSON.parse(localStorage.getItem('messages') || "[]");

function saveMessages() {
  localStorage.setItem('messages', JSON.stringify(messages));
}

function addMessage(m){
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.classList.add('msg');
  div.classList.add(m.sender === username ? 'me' : 'other');

  // text message
  if(m.text) div.textContent = m.sender + ": " + m.text;

  // image/video
  if(m.file){
    const ext = m.file.type.split('/')[0];
    if(ext==='image'){
      const img = document.createElement('img');
      img.src = m.file.data;
      div.appendChild(img);
    } else if(ext==='video'){
      const vid = document.createElement('video');
      vid.src = m.file.data;
      vid.controls = true;
      div.appendChild(vid);
    }
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// Load existing messages
messages.forEach(addMessage);

function send(){
  const input = document.getElementById('msg');
  const fileInput = document.getElementById('fileInput');
  const text = input.value.trim();

  let fileData = null;

  if(fileInput.files.length > 0){
    const file = fileInput.files[0];
    const reader = new FileReader();
    reader.onload = function(e){
      const msgObj = {
        sender: username,
        text: text || null,
        file: {data: e.target.result, type: file.type},
        timestamp: Date.now()
      };
      messages.push(msgObj);
      addMessage(msgObj);
      saveMessages();
      input.value = "";
      fileInput.value = "";
    };
    reader.readAsDataURL(file);
  } else if(text){
    const msgObj = {
      sender: username,
      text: text,
      timestamp: Date.now()
    };
    messages.push(msgObj);
    addMessage(msgObj);
    saveMessages();
    input.value = "";
  }
}

// auto delete messages older than 24h
function cleanupOldMessages(){
  const cutoff = Date.now() - 24*60*60*1000;
  messages = messages.filter(m => m.timestamp > cutoff);
  saveMessages();
  document.getElementById('chat').innerHTML = '';
  messages.forEach(addMessage);
}
setInterval(cleanupOldMessages, 60*60*1000); // every hour
</script>

</body>
</html>
